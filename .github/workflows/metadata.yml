name: Generate NFT Metadata

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Metadata Generator Script
        run: python generate.py # Changed from generate_metadata.py to generate.py

      - name: Commit and Push Generated Metadata
        run: |
          git config --global user.name "itazukilab"
          git config --global user.email "itazukilab@users.noreply.github.com"
          git add metadata/
          git commit -m "Automated: Generate sequential metadata files" || exit 0
          git push origin main
